  steps:
  # Build the container image with build arguments for Next.js
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/rapid-assistance-system:$COMMIT_SHA'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyArN1e05hajmuegjZCy3fo0mfhbzcDTODY'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=rapid-crisis-response-33ee8.firebaseapp.com'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_PROJECT_ID=rapid-crisis-response-33ee8'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=rapid-crisis-response-33ee8.firebasestorage.app'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=521493442805'
      - '--build-arg'
      - 'NEXT_PUBLIC_FIREBASE_APP_ID=1:521493442805:web:7233770a365992380515bc'
      - '--build-arg'
      - 'NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=AIzaSyC9DRwyvelVSVgw7SxCA9oPd3HJsy361O4'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEFAULT_LAT=25.2048'
      - '--build-arg'
      - 'NEXT_PUBLIC_DEFAULT_LNG=55.2708'
      - '.'

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/rapid-assistance-system:$COMMIT_SHA']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'solutionschallenge-rapidassistancesystem'
      - '--image'
      - 'gcr.io/$PROJECT_ID/rapid-assistance-system:$COMMIT_SHA'
      - '--region'
      - 'asia-south1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=AIzaSyA05PysH0u5LiaK3nBCVJMmExMOPmyyrE8'

images:
  - 'gcr.io/$PROJECT_ID/rapid-assistance-system:$COMMIT_SHA'
